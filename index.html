<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleta de resíduos</title>
</head>

<body>

    <h2>Cadastro de empresas</h2>

    <form id="formEmpresa">

        <label>Empresa</label><br>
        <input type="text" id="empresa" required>

        <br>

        <label>Quantidade recolhida em tonelada</label><br>

        <input type="number" id="quantidade" required>

        <br><br>

        <button type="submit">Cadastrar</button>

    </form>

    <h2>Formulario</h2>

    <p>Tabela com o fomulario</p>

    <table>

        <thead>

            <tr>
                <th>Empresa</th>
                <th>Quantidade</th>
                <th>Valor para receber</th>
                <th>Premiação</th>
                <th>Valor final</th>
            </tr>

        </thead>

        <tbody id="tabela">

        </tbody>

    </table>

    <script src="js/script.js"></script>

</body>

</html>
