<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleta de Resíduos</title>
</head>
<body>

<h2>Cadastro de Empresas</h2>

<form id="formEmpresa">

    <label>Empresa</label><br>
    <input type="text"id="empresa"required>

    <br>

    <label>Quantidade Recolhida (toneladas)</label><br>

    <input type="number"id="quantidade"required>

    <br><br>

    <button type="submit">Cadastrar</button>

</form>

<table>

    <thead>

        <tr>
            <th>Empresa</th>
            <th>Quantidade</th>
            <th>Valor a Receber</th>
            <th>Premiação</th>
            <th>Valor Final</th>
        </tr>

    </thead>

    <tbody id="tabela">

    </tbody>

</table>

<script src="js/script.js"></script>

</body>
</html>
